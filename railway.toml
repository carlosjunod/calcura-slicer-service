# railway.toml
# Both services (api + worker) share the same Dockerfile.
# Set SERVICE_ROLE env var in each Railway service:
#   api service    → SERVICE_ROLE=api
#   worker service → SERVICE_ROLE=worker

[build]
builder = "DOCKERFILE"
dockerfilePath = "worker/Dockerfile"

[deploy]
startCommand = "node scripts/start.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 300
